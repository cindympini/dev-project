{% extends "base.html" %}

{% block title %}New Project{% endblock %}

{% block content %}
<div class="form-container" style="max-width: 600px;">
    <div class="form-header">
        <h2>Create New Project 🚀</h2>
        <p>Share what you're building with the community</p>
    </div>
    
    <form method="POST">
        <div class="form-group">
            <label class="form-label">Project Title</label>
            <input type="text" name="title" class="form-input" placeholder="My Awesome Project" required>
        </div>
        
        <div class="form-group">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-textarea" placeholder="What are you building? What problem does it solve?" required></textarea>
        </div>
        
        <div class="form-group">
            <label class="form-label">Current Stage</label>
            <select name="stage" class="form-select">
                <option value="idea">💡 Idea</option>
                <option value="building">🔨 Building</option>
                <option value="beta">🧪 Beta</option>
                <option value="launched">🚀 Launched</option>
            </select>
        </div>
        
        <div class="form-group">
            <label class="form-label">Support Needed (Optional)</label>
            <input type="text" name="support" class="form-input" placeholder="e.g., Frontend developer, Designer, Beta testers...">
        </div>
        
        <div class="flex gap-4">
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary w-full">Cancel</a>
            <button type="submit" class="btn btn-primary w-full">Create Project</button>
        </div>
    </form>
</div>
{% endblock %}
